# ============================================================
# LLM ThreatIntel — Automated Intelligence Collection
# Option B: GitHub Actions + Claude API
# Runs daily at 04:00 UTC (5:00 AM BST / UK summer)
# ============================================================
#
# SETUP REQUIRED:
# 1. Add ANTHROPIC_API_KEY as a repository secret
#    Settings > Secrets and variables > Actions > New repository secret
#
# 2. Ensure GitHub Actions has write permissions
#    Settings > Actions > General > Workflow permissions > Read and write
#
# NOTE: This is the GitHub Actions alternative to running Claude Code
# locally via cron. Both approaches work. Choose one.
# ============================================================

name: Daily Intelligence Collection

on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC = 05:00 BST
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run collection script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/collect.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "LLM ThreatIntel Bot"
          git config user.email "bot@llm-threatintel.github.io"
          git add -A
          git commit -m "intel: $(date +%Y-%m-%d) automated collection"
          git push

  deploy:
    needs: collect
    if: needs.collect.outputs.changed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
